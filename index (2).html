<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meridian — Weather Across the East</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230B0D12'/%3E%3Cpath d='M40 14a12 12 0 1 0 10 18.6A14 14 0 0 1 40 14Z' fill='%23F3F1ED' opacity='0.9'/%3E%3Cpath d='M14 40a10 10 0 0 1 9.8-10c.9-4.6 4.9-8 9.7-8 5.4 0 9.8 4.3 10 9.7A8.5 8.5 0 0 1 42 48H22a8 8 0 0 1-8-8Z' fill='%23161A22' stroke='%23F3F1ED' stroke-width='2' stroke-opacity='0.18'/%3E%3Cpath d='M33 36l-6 9h5l-3 7 8-10h-5l4-6z' fill='%23E8965F'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#F3F1ED;
    --ink-dim: rgba(243,241,237,0.68);
    --ink-faint: rgba(243,241,237,0.42);
    --terracotta:#E8965F;
    --terracotta-glow: rgba(232,150,95,0.4);
    --sky:#AFC9DD;
    --line: rgba(255,255,255,0.14);
    --glass: rgba(15,16,20,0.42);
    --glass-strong: rgba(15,16,20,0.6);
    --radius: 20px;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }

  body{
    font-family:'Inter', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background: #0a0b0d;
  }

  /* Photographic stormy backdrop */
  .photo-bg{
    position: fixed;
    inset: 0;
    z-index: -3;
    background-image:
      linear-gradient(180deg, rgba(5,6,8,0.55) 0%, rgba(5,6,8,0.25) 35%, rgba(5,6,8,0.7) 100%),
      url('https://images.unsplash.com/photo-1757044123133-6613b20ff24c?fm=jpg&q=80&w=2400&auto=format&fit=crop');
    background-size: cover;
    background-position: center 35%;
    filter: saturate(0.9) contrast(1.05);
  }
  .photo-vignette{
    position: fixed;
    inset: 0;
    z-index: -2;
    background: radial-gradient(120% 100% at 50% 0%, transparent 40%, rgba(5,6,8,0.55) 100%);
    pointer-events: none;
  }
  .lightning{
    position: fixed;
    inset: 0;
    z-index: -1;
    background: rgba(220,228,245,0.5);
    opacity: 0;
    pointer-events: none;
  }
  .lightning.flash{ animation: flash 0.6s ease-out; }
  @keyframes flash{
    0%{ opacity: 0; } 8%{ opacity: 0.85; } 14%{ opacity: 0.1; }
    20%{ opacity: 0.6; } 30%{ opacity: 0; } 100%{ opacity: 0; }
  }

  .app{
    display: flex;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px;
    gap: 24px;
    align-items: flex-start;
  }
  @media (max-width: 900px){
    .app{ flex-direction: column; padding: 16px; }
  }

  /* ===== Sidebar ===== */
  .sidebar{
    width: 300px;
    flex-shrink: 0;
    background: var(--glass);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 26px 22px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  @media (max-width: 900px){ .sidebar{ width: 100%; } }

  .logo{
    font-family:'Archivo Expanded', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.01em;
  }
  .logo span{ color: var(--terracotta); }

  .panel-label{
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
  }

  .city-card{
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
  }
  .city-card .name{
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 2px;
  }
  .city-card .sub{
    font-size: 12px;
    color: var(--ink-faint);
  }

  .chip-list{
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .chip-list::-webkit-scrollbar{ width: 4px; }
  .chip-list::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.15); border-radius: 4px; }

  .chip{
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.04);
    color: var(--ink-dim);
    cursor: pointer;
    text-align: left;
    transition: all .15s ease;
  }
  .chip:hover{
    border-color: var(--terracotta);
    color: var(--terracotta);
    background: rgba(232,150,95,0.08);
  }
  .chip.active{
    background: rgba(232,150,95,0.12);
    border-color: var(--terracotta);
    color: var(--terracotta);
  }

  /* ===== Main panel ===== */
  .main{
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .location-line{
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--ink-dim);
    font-weight: 500;
  }
  .location-line .dot{ color: var(--ink-faint); margin: 0 2px; }

  .search-row{
    display:flex;
    gap: 10px;
  }
  .search-row input{
    width: 240px;
    max-width: 50vw;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 11px 16px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search-row input:focus{
    border-color: var(--terracotta);
    box-shadow: 0 0 0 3px var(--terracotta-glow);
  }
  .search-row input::placeholder{ color: var(--ink-faint); }
  .search-row button{
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 11px 20px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--terracotta), #CC7945);
    color: #1A0F08;
    cursor: pointer;
    transition: filter .15s ease, transform .1s ease;
  }
  .search-row button:hover{ filter: brightness(1.08); }
  .search-row button:active{ transform: scale(0.97); }

  /* Hero */
  .hero-block{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    flex-wrap: wrap;
  }
  .hero-temp-group{
    display: flex;
    align-items: flex-start;
    gap: 18px;
  }
  .hero-temp{
    font-family: 'Archivo Expanded', sans-serif;
    font-size: clamp(56px, 9vw, 88px);
    font-weight: 600;
    line-height: 0.9;
    letter-spacing: -0.02em;
  }
  .hero-temp sup{ font-size: 0.35em; font-weight: 500; }
  .hero-range{
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .hero-range .pill{
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    color: var(--ink-dim);
  }

  .hero-headline{
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 600;
    font-size: clamp(26px, 4vw, 38px);
    line-height: 1.15;
    color: var(--ink);
    max-width: 380px;
  }

  .hero-aside{
    max-width: 280px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-dim);
    text-align: right;
  }
  @media (max-width: 700px){ .hero-aside{ text-align: left; max-width: 100%; } }

  /* Recently searched mini cards */
  .mini-row{
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .mini-card{
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 150px;
  }
  .mini-card img{ width: 30px; height: 30px; }
  .mini-card .t{ font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 16px; }
  .mini-card .c{ font-size: 11px; color: var(--ink-faint); text-transform: capitalize; }

  /* Trend strip with wavy line */
  .trend-panel{
    background: var(--glass);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 26px 24px 18px;
    margin-top: auto;
  }
  .trend-days{
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }
  .trend-days span{
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-faint);
    text-align: center;
  }
  .trend-svg{ width: 100%; height: 90px; display: block; }
  .trend-temps{
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-top: 4px;
  }
  .trend-temps .t{
    text-align: center;
    font-family: 'Archivo Expanded', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-faint);
  }
  .trend-temps .t.peak{ color: var(--terracotta); }

  /* States */
  .status{
    text-align:center;
    padding: 80px 20px;
    color: var(--ink-dim);
    font-size: 15px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: 24px;
  }
  .status.error{ color: var(--terracotta); font-weight: 600; }
  .hidden{ display:none !important; }

  footer{
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="photo-bg"></div>
<div class="photo-vignette"></div>
<div class="lightning" id="lightning"></div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">Meridi<span>an</span></div>

    <div>
      <div class="panel-label" style="margin-bottom:10px;">Selected city</div>
      <div class="city-card">
        <div class="name" id="sidebarCityName">No city selected</div>
        <div class="sub" id="sidebarCitySub">Search or pick from the list</div>
      </div>
    </div>

    <div>
      <div class="panel-label" style="margin-bottom:10px;">Pakistan &amp; the East</div>
      <div class="chip-list" id="chipRow">
        <button class="chip" data-city="Karachi">Karachi, Pakistan</button>
        <button class="chip" data-city="Lahore">Lahore, Pakistan</button>
        <button class="chip" data-city="Islamabad">Islamabad, Pakistan</button>
        <button class="chip" data-city="Peshawar">Peshawar, Pakistan</button>
        <button class="chip" data-city="Quetta">Quetta, Pakistan</button>
        <button class="chip" data-city="Multan">Multan, Pakistan</button>
        <button class="chip" data-city="Faisalabad">Faisalabad, Pakistan</button>
        <button class="chip" data-city="Dubai">Dubai, UAE</button>
        <button class="chip" data-city="Riyadh">Riyadh, Saudi Arabia</button>
        <button class="chip" data-city="New Delhi">New Delhi, India</button>
        <button class="chip" data-city="Dhaka">Dhaka, Bangladesh</button>
        <button class="chip" data-city="Colombo">Colombo, Sri Lanka</button>
        <button class="chip" data-city="Singapore">Singapore</button>
        <button class="chip" data-city="Tokyo">Tokyo, Japan</button>
        <button class="chip" data-city="Beijing">Beijing, China</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="location-line" id="topLocation">Live weather across Pakistan and the East</div>
      <form class="search-row" id="searchForm">
        <input type="text" id="cityInput" placeholder="Search a city…" autocomplete="off" />
        <button type="submit">Search</button>
      </form>
    </div>

    <div id="statusBox" class="status">Search for a city or pick one from the sidebar to see live conditions and a 5-day forecast.</div>

    <div id="results" class="hidden" style="display:flex; flex-direction:column; gap:22px; flex:1;">

      <div class="hero-block">
        <div>
          <div class="hero-temp-group">
            <div class="hero-temp" id="heroTemp">--<sup>°C</sup></div>
            <div class="hero-range" id="heroRange"></div>
          </div>
          <div class="hero-headline" id="heroHeadline" style="margin-top:14px;"></div>
        </div>
        <div class="hero-aside" id="heroAside"></div>
      </div>

      <div class="mini-row" id="miniRow"></div>

      <div class="trend-panel">
        <div class="trend-days" id="trendDays"></div>
        <svg class="trend-svg" id="trendSvg" viewBox="0 0 500 90" preserveAspectRatio="none"></svg>
        <div class="trend-temps" id="trendTemps"></div>
      </div>
    </div>

    <footer>Built by Mohammad Ayan| All rights reserved ©.</footer>
  </main>

</div>

<script>
  const API_KEY = "b1a10b66422491d3a835dc30568e6eab";

  const form = document.getElementById('searchForm');
  const input = document.getElementById('cityInput');
  const statusBox = document.getElementById('statusBox');
  const results = document.getElementById('results');
  const chipRow = document.getElementById('chipRow');
  const sidebarCityName = document.getElementById('sidebarCityName');
  const sidebarCitySub = document.getElementById('sidebarCitySub');
  const heroTemp = document.getElementById('heroTemp');
  const heroRange = document.getElementById('heroRange');
  const heroHeadline = document.getElementById('heroHeadline');
  const heroAside = document.getElementById('heroAside');
  const miniRow = document.getElementById('miniRow');
  const trendDays = document.getElementById('trendDays');
  const trendSvg = document.getElementById('trendSvg');
  const trendTemps = document.getElementById('trendTemps');

  let recentSearches = []; // {name, country, temp, icon, desc}

  // Lightning flicker
  const lightningEl = document.getElementById('lightning');
  function scheduleLightning(){
    const delay = 7000 + Math.random() * 13000;
    setTimeout(() => {
      lightningEl.classList.remove('flash');
      void lightningEl.offsetWidth;
      lightningEl.classList.add('flash');
      scheduleLightning();
    }, delay);
  }
  scheduleLightning();

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const city = input.value.trim();
    if (city) fetchWeather(city);
  });

  chipRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    input.value = btn.dataset.city;
    fetchWeather(btn.dataset.city);
  });

  function setStatus(msg, isError = false) {
    results.classList.add('hidden');
    statusBox.classList.remove('hidden');
    statusBox.textContent = msg;
    statusBox.classList.toggle('error', isError);
  }

  async function fetchWeather(city) {
    if (API_KEY === "YOUR_OPENWEATHERMAP_API_KEY") {
      setStatus('Add your OpenWeatherMap API key in the script section (API_KEY) to enable live data.', true);
      return;
    }

    setStatus('Loading weather for ' + city + '…');

    try {
      const [currentRes, forecastRes] = await Promise.all([
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${API_KEY}`),
        fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&appid=${API_KEY}`)
      ]);

      if (!currentRes.ok || !forecastRes.ok) {
        if (currentRes.status === 404) setStatus('City not found. Check the spelling and try again.', true);
        else if (currentRes.status === 401) setStatus('Invalid API key. Check your OpenWeatherMap key.', true);
        else setStatus('Something went wrong fetching the weather. Try again.', true);
        return;
      }

      const current = await currentRes.json();
      const forecast = await forecastRes.json();

      renderAll(current, forecast);

      results.classList.remove('hidden');
      statusBox.classList.add('hidden');
    } catch (err) {
      setStatus('Network error — check your connection and try again.', true);
    }
  }

  function renderAll(data, forecast) {
    const icon = data.weather[0].icon;
    const iconUrl = `https://openweathermap.org/img/wn/${icon}@2x.png`;

    sidebarCityName.textContent = `${data.name}, ${data.sys.country}`;
    sidebarCitySub.textContent = capitalize(data.weather[0].description);

    heroTemp.innerHTML = `${Math.round(data.main.temp)}<sup>°C</sup>`;
    heroRange.innerHTML = `
      <span class="pill">H ${Math.round(data.main.temp_max)}°</span>
      <span class="pill">L ${Math.round(data.main.temp_min)}°</span>
    `;

    const condWord = capitalize(data.weather[0].main);
    heroHeadline.textContent = `${condWord} with ${data.weather[0].description}`;

    heroAside.innerHTML = `With real-time data from OpenWeatherMap, get current conditions and a 5-day outlook for ${data.name} and cities across Pakistan and the East.`;

    // Recently searched mini cards (keep last 2, excluding current)
    recentSearches = recentSearches.filter(c => c.name !== data.name);
    recentSearches.unshift({
      name: data.name,
      country: data.sys.country,
      temp: Math.round(data.main.temp),
      icon: icon,
      desc: data.weather[0].description
    });
    recentSearches = recentSearches.slice(0, 4);

    miniRow.innerHTML = recentSearches.map(c => `
      <div class="mini-card">
        <img src="https://openweathermap.org/img/wn/${c.icon}.png" alt="${c.desc}" />
        <div>
          <div class="t">${c.temp}°</div>
          <div class="c">${c.name}, ${c.country}</div>
        </div>
      </div>
    `).join('');

    renderTrend(forecast);
  }

  function renderTrend(data) {
    const dayMap = {};
    data.list.forEach(item => {
      const date = new Date(item.dt * 1000);
      const key = date.toISOString().split('T')[0];
      const hour = date.getUTCHours();
      if (!dayMap[key] || Math.abs(hour - 12) < Math.abs(dayMap[key]._hour - 12)) {
        item._hour = hour;
        dayMap[key] = item;
      }
    });
    const days = Object.values(dayMap).slice(0, 5);
    const temps = days.map(d => Math.round(d.main.temp));
    const maxT = Math.max(...temps);
    const minT = Math.min(...temps);
    const range = Math.max(maxT - minT, 1);

    trendDays.innerHTML = days.map(d => {
      const date = new Date(d.dt * 1000);
      return `<span>${date.toLocaleDateString('en-US', { weekday: 'long' })}</span>`;
    }).join('');

    // Build wavy path through points
    const w = 500, h = 90, pad = 14;
    const points = temps.map((t, i) => {
      const x = pad + (i / (temps.length - 1)) * (w - pad * 2);
      const y = h - pad - ((t - minT) / range) * (h - pad * 2);
      return [x, y];
    });

    let path = `M ${points[0][0]} ${points[0][1]}`;
    for (let i = 0; i < points.length - 1; i++) {
      const [x1, y1] = points[i];
      const [x2, y2] = points[i + 1];
      const mx = (x1 + x2) / 2;
      path += ` C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    }

    const peakIdx = temps.indexOf(maxT);
    const peak = points[peakIdx];

    trendSvg.innerHTML = `
      <path d="${path}" fill="none" stroke="rgba(243,241,237,0.55)" stroke-width="2" />
      <circle cx="${peak[0]}" cy="${peak[1]}" r="5" fill="#E8965F" />
      <circle cx="${peak[0]}" cy="${peak[1]}" r="9" fill="none" stroke="#E8965F" stroke-width="1.5" opacity="0.5" />
      <line x1="${peak[0]}" y1="${peak[1]}" x2="${peak[0]}" y2="${h}" stroke="rgba(232,150,95,0.4)" stroke-width="1" stroke-dasharray="2,3" />
    `;

    trendTemps.innerHTML = temps.map((t, i) => `<div class="t ${t === maxT ? 'peak' : ''}">${t}°</div>`).join('');
  }

  function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
</script>
</body>
</html>
